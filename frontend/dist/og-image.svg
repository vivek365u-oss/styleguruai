<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816"/>
      <stop offset="50%" style="stop-color:#1e0a3c"/>
      <stop offset="100%" style="stop-color:#050816"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow circles -->
  <circle cx="200" cy="150" r="300" fill="#7c3aed" opacity="0.15"/>
  <circle cx="1000" cy="480" r="250" fill="#ec4899" opacity="0.12"/>
  <!-- Logo -->
  <rect x="80" y="80" width="60" height="60" rx="14" fill="url(#purple)"/>
  <text x="110" y="122" font-family="Arial" font-size="28" font-weight="bold" fill="white" text-anchor="middle">SG</text>
  <!-- Brand name -->
  <text x="160" y="108" font-family="Arial" font-size="22" font-weight="bold" fill="#a855f7">StyleGuru AI</text>
  <text x="160" y="130" font-family="Arial" font-size="14" fill="#6b7280">AI-Powered Fashion Advisor</text>
  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial" font-size="56" font-weight="bold" fill="white">Discover Your</text>
  <text x="80" y="330" font-family="Arial" font-size="56" font-weight="bold" fill="url(#purple)">Perfect Style</text>
  <text x="80" y="400" font-family="Arial" font-size="56" font-weight="bold" fill="white">with AI ✨</text>
  <!-- Subtitle -->
  <text x="80" y="460" font-family="Arial" font-size="24" fill="#9ca3af">Upload your selfie → Get personalized outfit recommendations</text>
  <text x="80" y="492" font-family="Arial" font-size="24" fill="#9ca3af">based on your skin tone. 100% Free. All Indian skin tones.</text>
  <!-- CTA -->
  <rect x="80" y="530" width="220" height="52" rx="26" fill="url(#purple)"/>
  <text x="190" y="562" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Try Now — Free</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="Arial" font-size="18" fill="#6b7280" text-anchor="end">styleguruai.in</text>
  <!-- Skin tone swatches -->
  <circle cx="900" cy="280" r="60" fill="#F5DEB3" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
  <circle cx="990" cy="320" r="60" fill="#C68642" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
  <circle cx="1080" cy="280" r="60" fill="#7B4F2E" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
  <circle cx="945" cy="390" r="50" fill="#D2A679" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
  <circle cx="1035" cy="390" r="50" fill="#4A2C0A" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
</svg>
