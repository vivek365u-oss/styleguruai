services:
  - type: web
    name: styleguruai-backend
    runtime: python
    pythonVersion: '3.10'
    buildCommand: './render-build.sh'
    startCommand: './render-start.sh'
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: '1'
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: 'python'
      - key: SENTRY_DSN
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
